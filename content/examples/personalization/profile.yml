# content/examples/personalization/profile.yml — Sample profile for onboarding.
# Copy to inputs/personalization/profile.yml and fill with your own content.

# Identity — contact info displayed on PDFs and in evaluation reports.
candidate:
  full_name: "Jane Smith"
  email: "jane@example.com"
  phone: "+1-555-0123"
  linkedin: "linkedin.com/in/janesmith"
  portfolio_url: "https://janesmith.dev"
  github: "github.com/janesmith"
# Target roles you're hunting + sub-flavors with fit assessment.
target_roles:
  # Preferred years-of-experience band — drives the `seniority` axis in the
  # screener + evaluator (`batch/screen-prompt.md`, `content/modes/evaluate.md`).
  # Roles whose required YoE falls inside this band score 4.5-5.0 on the
  # seniority axis; roles further from it scale down progressively.
  # Format: "{min}-{max}" string (e.g. "2-3", "5-7"), or "any" / omit to
  # disable seniority-axis weighting entirely.
  preferred_yoe: "5-7"
  archetypes:
    - name: "AI/ML Engineer"
      level: "senior" # value-list: junior | mid | senior | staff | principal
      fit: "primary" # value-list: primary | secondary | adjacent
    - name: "AI Product Manager"
      level: "senior"
      fit: "secondary"
    - name: "Solutions Architect"
      level: "mid"
      fit: "adjacent"
# Your story. Headline + supporting points modes weave into reports & PDFs.
narrative:
  headline: "ML Engineer turned AI product builder"
  exit_story: "Built and sold my SaaS after 5 years. Now focused on applied AI at scale."
  superpowers:
    - "End-to-end ML pipelines"
    - "Fast prototyping (idea to prod in 2 weeks)"
    - "Cross-functional communication"
  proof_points:
    - name: "Project Alpha"
      url: "https://janesmith.dev/project-alpha"
      hero_metric: "Reduced inference latency 40%"
    - name: "Open Source Tool"
      url: "https://github.com/janesmith/tool"
      hero_metric: "2K+ GitHub stars"
# Comp targets — used by ranking + negotiation prompts.
compensation:
  target_range: "$150K-200K"
  currency: "USD"
  minimum: "$120K"
  notes: ""
# Where you work, languages, geo policy.
location:
  country: "United States"
  city: "San Francisco"
  timezone: "America/Los_Angeles" # IANA TZ
  visa_status: "citizen" # value-list: citizen | green-card | h1b | other
  onsite_availability: "remote" # value-list: remote | hybrid | onsite | open
  location_flexibility: "flexible" # value-list: strict | flexible | open
languages:
  - name: "English"
    proficiency: "native" # value-list: native | full | professional | conversational | basic
# Search params — keywords + locations. Both scanners read these:
# - `terms` sieve every posting title in JobSpy AND the ATS portal scanner.
# - `locations` are where JobSpy crawls, and (with `location.*` below) also the
#   allow-list the ATS scanner filters each posting's location against —
#   `onsite_availability` decides if "remote" always passes; `flexibility` is
#   strict (these locations only), flexible (+ country-wide), or open (no filter).
search:
  terms:
    - "AI Engineer"
    - "ML Engineer"
    - "Machine Learning Engineer"
  locations:
    - "San Francisco, CA"
