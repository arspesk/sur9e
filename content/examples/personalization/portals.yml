  # ── Enterprise (Workday) — template ──
  #
  # Workday tenants expose a paginated POST feed. careers_url is
  # {tenant}.{shard}.myworkdayjobs.com/{site}; the scanner derives the
  # /wday/cxs/{tenant}/{site}/jobs endpoint. Large tenants return thousands
  # of postings, so lean on your profile search.terms sieve. Example:
  # - name: NVIDIA
  #   careers_url: https://nvidia.wd5.myworkdayjobs.com/NVIDIAExternalCareerSite
  #   enabled: true

  # ── Custom parser — universal escape hatch (template) ──
  #
  # For a company whose careers page is none of the ATS above, point at a local
  # script that fetches its postings and prints JSON. Copy
  # content/examples/parsers/example.mjs to inputs/parsers/<company>.mjs, fill in
  # the extraction, and reference it here. Or just ask your agent: "write a sur9e
  # parser for <company>'s careers page" — it can inspect the page and write it.
  #
  # Guardrails (enforced in batch/scan-portals.mjs): `command` must be one of
  # python3/python/node/deno/bash/sh/ruby, and `script` must resolve inside
  # inputs/parsers/. The script runs with no shell, a 20s timeout, and a 2MB
  # output cap. Output: print { jobs: [{ title, url, location? }] } to stdout
  # ({careers_url}/{company} placeholders in args are substituted at run time).
  # - name: Acme
  #   careers_url: https://acme.example.com/careers
  #   parser:
  #     command: node
  #     script: inputs/parsers/acme.mjs
  #     args: ["--url", "{careers_url}"]
  #   enabled: true
