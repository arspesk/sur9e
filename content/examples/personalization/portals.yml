# content/examples/personalization/portals.yml
#
# ATS portal scanner config — the zero-token half of sur9e's scanner.
# Copy to inputs/personalization/portals.yml and customize, then enable the
# "ATS portals" source in Settings → Job scanning (it's on by default).
#
# How it works:
#   batch/scan-portals.mjs reads `tracked_companies` below and fetches each
#   company's ATS feed directly over HTTP — Greenhouse, Ashby, Lever, Workday,
#   Workable, Recruitee, SmartRecruiters, and SolidJobs. No AI tokens, no
#   browser. New postings are title-sieved against your profile.yml
#   `search.terms` (same filter JobSpy uses — one source of truth),
#   deduplicated, and appended to data/pipeline.md.
#
# Adding a company:
#   - Greenhouse → set BOTH careers_url and api: (the boards-api JSON endpoint).
#   - Ashby / Lever / Workable / Workday / Recruitee / SmartRecruiters → just
#     careers_url; the scanner derives the API endpoint from the URL
#     (e.g. https://<slug>.recruitee.com, https://careers.smartrecruiters.com/<slug>).
#   - SolidJobs → set careers_url to the public-api endpoint directly
#     (https://solid.jobs/public-api/offers/<division>).
#   - enabled: false (or omit) to skip a company without deleting it.
#   - notes: free-text, ignored by the scanner.
#
# Title & location filtering live in your profile, NOT here:
#   profile.yml `search.terms` is the single keyword sieve for BOTH scanners.

