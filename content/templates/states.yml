# sur9e — Canonical States
# Source of truth for sur9e (writer) and dashboard (reader).
# Both systems MUST use these exact states.
#
# Rule: The status field in applications.md must contain EXACTLY
# one of these values (case-insensitive). No markdown bold (**),
# no dates, no extra text. Dates go in the date column.
#
# Date columns in applications.md:
#   Date   — when the offer entered the tracker (scan/evaluation date).
#            Required; the timeline every cadence/analytics behavior keys on.
#   Posted — the true posting date (YYYY-MM-DD), optional trailing column.
#            Captured from the scan source or JD when available; the cell is
#            empty (and legacy 9-column rows omit it entirely) when unknown.
#            Never backfilled, never guessed.

states:
  - id: screened
    label: Screened
    description: Pre-screened by automated scanner, pending full evaluation
    dashboard_group: evaluated

  - id: evaluated
    label: Evaluated
    description: Offer evaluated with report, pending decision
    dashboard_group: evaluated

  - id: applied
    label: Applied
    description: Application submitted
    dashboard_group: applied

  - id: responded
    label: Responded
    description: Company has responded (not yet interview)
    dashboard_group: responded

  - id: interview
    label: Interview
    description: Active interview process
    dashboard_group: interview

  - id: offer
    label: Offer
    description: Offer received
    dashboard_group: offer

  - id: rejected
    label: Rejected
    description: Rejected by company
    dashboard_group: rejected

  - id: discarded
    label: Discarded
    description: Discarded by candidate or offer closed
    dashboard_group: discarded
